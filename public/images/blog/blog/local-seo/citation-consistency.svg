  <rect x="570" y="190" width="140" height="10" rx="4" fill="#6B7A90"/>
  <text x="585" y="245" font-family="Inter, sans-serif" font-size="11" fill="#E74C3C">Yellow Pages (wrong)</text>
  <!-- Label -->
  <text x="180" y="380" font-family="Inter, sans-serif" font-size="13" fill="#6B7A90">PLACEHOLDER — Replace with NAP consistency comparison graphic</text>
