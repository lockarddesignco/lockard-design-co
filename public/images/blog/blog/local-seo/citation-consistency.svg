  <rect x="80" y="125" width="150" height="12" rx="4" fill="#1A1A2E"/>
  <rect x="80" y="150" width="130" height="10" rx="4" fill="#6B7A90"/>
  <rect x="80" y="170" width="110" height="10" rx="4" fill="#6B7A90"/>
