  <rect x="325" y="125" width="150" height="12" rx="4" fill="#1A1A2E"/>
  <rect x="325" y="150" width="130" height="10" rx="4" fill="#6B7A90"/>
  <rect x="325" y="170" width="110" height="10" rx="4" fill="#6B7A90"/>
  <rect x="325" y="190" width="140" height="10" rx="4" fill="#6B7A90"/>
  <text x="355" y="245" font-family="Inter, sans-serif" font-size="11" fill="#27AE60">Yelp</text>
  <!-- Card 3 - Inconsistent (red) -->
  <rect x="540" y="50" width="210" height="260" rx="10" fill="#FFFFFF" stroke="#E74C3C" stroke-width="2"/>
  <circle cx="645" cy="90" r="20" fill="#E74C3C" opacity="0.15"/>
  <text x="639" y="97" font-family="Inter, sans-serif" font-size="18" fill="#E74C3C">&#10007;</text>
  <rect x="570" y="125" width="150" height="12" rx="4" fill="#1A1A2E"/>
  <rect x="570" y="150" width="130" height="10" rx="4" fill="#E74C3C" opacity="0.3"/>
