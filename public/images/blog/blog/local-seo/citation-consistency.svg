  <text x="100" y="245" font-family="Inter, sans-serif" font-size="11" fill="#27AE60">Google</text>
  <!-- Card 2 - Consistent (green) -->
  <rect x="295" y="50" width="210" height="260" rx="10" fill="#FFFFFF" stroke="#27AE60" stroke-width="2"/>
